kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for extractions. One record per unit of output.
    Generated 2026-04-01T09:22:10Z.
  generated_by: ContractGenerator v1.0.0
  generated_at: '2026-04-01T09:22:10Z'
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish externally.
  limitations: All confidence fields must remain in 0.0–1.0 float range. Do not change
    to percentage scale without a formal migration plan.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    unique: true
  source_path:
    type: string
    required: true
  source_hash:
    type: string
    required: true
    format: sha256
    pattern: ^[a-f0-9]{64}$
  extracted_facts:
    type: array
    items:
      fact_id:
        type: string
        format: uuid
        unique: true
      text:
        type: string
        minLength: 1
      entity_refs:
        type: array
        items:
          type: string
          format: uuid
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
        required: true
        description: BREAKING CHANGE if scale changed to 0-100
      page_ref:
        type: integer
        nullable: true
      source_excerpt:
        type: string
    required: true
  entities:
    type: array
    items:
      entity_id:
        type: string
        format: uuid
        unique: true
      name:
        type: string
      type:
        type: string
        enum:
        - PERSON
        - ORG
        - LOCATION
        - DATE
        - AMOUNT
        - OTHER
      canonical_value:
        type: string
    required: true
  extraction_model:
    type: string
    required: true
    enum:
    - claude-3-5-sonnet-20241022
    - claude-3-haiku-20240307
    - gpt-4o-2024-08-06
    pattern: ^(claude|gpt)-
    description: Model identifier. Must match pattern claude-* or gpt-*.
  processing_time_ms:
    type: integer
    required: true
    minimum: 1
    description: Must be a positive integer (milliseconds).
  token_count:
    type: object
    required: true
    properties:
      input:
        type: integer
        minimum: 0
      output:
        type: integer
        minimum: 0
  extracted_at:
    type: string
    required: true
    format: date-time
    description: ISO 8601 timestamp
quality:
  type: SodaChecks
  specification:
    checks for extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - min(processing_time_ms) >= 1
    - missing_count(extracted_at) = 0
    - row_count >= 1
lineage:
  upstream: []
  downstream:
  - id: week4-cartographer
    description: Cartographer ingests doc_id and extracted_facts as node metadata
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    breaking_if_changed:
    - extracted_facts.confidence
    - doc_id
